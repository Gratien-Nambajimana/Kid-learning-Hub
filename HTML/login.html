<!DOCTYPE html>
<html>

<head>
    <title>Kids Learning Hub - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<div id="clock" style="
text-align:center;
font-size:30px;
font-weight:bold;
color:#4CAF50;
padding:15px;">
</div>
<body class="hero">

<header>
    Kids Learning Hub Login
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="Register.html">Register</a>
   
</nav>

<div class="login-container">

    <!-- USER LOGIN -->
    <div class="login-box">

        <h2>User Login</h2>

        <form>

            Email:<br>
            <input type="email"
id="userEmail"
placeholder="Enter your email">
            <br><br>

            Password:<br>
          <input type="password"
id="userPassword"
placeholder="Enter password">
            <br><br>

            <button
type="button"
onclick="userLogin()">
Login as User
</button>
        </form>

    </div>

    <!-- ADMIN LOGIN -->
    <div class="login-box">

        <h2>Admin Login</h2>

        <form>

            Admin Username:<br>
            <input type="text"
id="adminUser"
placeholder="Enter admin username">

            <br><br>

            Password:<br>
            <input type="password"
id="adminPass"
placeholder="Enter admin password">
            <br><br>

            <button
type="button"
onclick="adminLogin()">
Login as Admin
</button>

        </form>

    </div>

</div>

<footer>
    © 2026 Kids Learning Hub
</footer>
<script src="script.js"></script>
</body>
</html>
